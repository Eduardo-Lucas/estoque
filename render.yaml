databases:
  - name: estoque-db
    plan: free
    databaseName: estoque
    user: estoque

services:
  - name: estoque-backend
    type: web
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn estoque_backend.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: estoque-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          name: estoque-frontend
          type: web
          property: host
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          name: estoque-frontend
          type: web
          property: host
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

  - name: estoque-frontend
    type: web
    runtime: static
    rootDir: frontend
    buildCommand: ./build.sh
    staticPublishPath: dist/estoque-frontend/browser
    envVars:
      - key: BACKEND_HOST
        fromService:
          name: estoque-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
