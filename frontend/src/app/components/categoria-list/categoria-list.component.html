<section class="card">
  <div class="secao-header">
    <h2>Categorias cadastradas</h2>
    <button type="button" class="icon-button" data-tooltip="Criar categoria" aria-label="Criar categoria" (click)="criarCategoria()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <div class="alert alert-error" *ngIf="erro">{{ erro }}</div>
  <div class="alert alert-success" *ngIf="sucesso">{{ sucesso }}</div>

  <p *ngIf="carregando">Carregando...</p>

  <table *ngIf="!carregando">
    <thead>
      <tr>
        <th>Nome</th>
        <th>Descrição</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let categoria of categorias">
        <td>{{ categoria.nome }}</td>
        <td>{{ categoria.descricao || '-' }}</td>
        <td>
          <div class="icon-actions">
            <button type="button" class="icon-button" data-tooltip="Editar" aria-label="Editar" (click)="editar(categoria)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            </button>
            <button type="button" class="icon-button danger" data-tooltip="Remover" aria-label="Remover" (click)="pedirRemocao(categoria)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            </button>
          </div>
        </td>
      </tr>
      <tr *ngIf="categorias.length === 0">
        <td colspan="3">Nenhuma categoria cadastrada ainda.</td>
      </tr>
    </tbody>
  </table>
</section>

<div class="modal-overlay" *ngIf="categoriaParaRemover as categoria" (click)="cancelarRemocao()">
  <div class="modal" (click)="$event.stopPropagation()">
    <h3>Remover categoria</h3>
    <p>Tem certeza que deseja remover <strong>"{{ categoria.nome }}"</strong>? Essa ação não pode ser desfeita.</p>
    <div class="modal-actions">
      <button class="secondary" (click)="cancelarRemocao()">Cancelar</button>
      <button class="danger" (click)="confirmarRemocao()">Remover</button>
    </div>
  </div>
</div>
