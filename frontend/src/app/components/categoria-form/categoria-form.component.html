<section class="card">
  <h2>{{ emEdicao ? 'Editar categoria' : 'Criar categoria' }}</h2>

  <div class="alert alert-error" *ngIf="erro">{{ erro }}</div>
  <p *ngIf="carregando">Carregando...</p>

  <form [formGroup]="form" (ngSubmit)="salvar()" class="form-grid" *ngIf="!carregando">
    <div>
      <label>Nome</label>
      <input formControlName="nome" name="nome" placeholder="Ex: Ferragens">
      <small class="field-error" *ngIf="form.get('nome')?.invalid && form.get('nome')?.touched">
        Informe pelo menos 2 caracteres.
      </small>
    </div>
    <div>
      <label>Descrição</label>
      <input formControlName="descricao" name="descricao" placeholder="Opcional">
    </div>
    <div class="campo-checkbox">
      <label>
        <input type="checkbox" formControlName="ativo" name="ativo">
        Categoria ativa
      </label>
    </div>
    <div>
      <button type="submit">{{ emEdicao ? 'Salvar alterações' : 'Adicionar categoria' }}</button>
      <button type="button" class="secondary" (click)="cancelar()">Cancelar</button>
    </div>
  </form>
</section>
